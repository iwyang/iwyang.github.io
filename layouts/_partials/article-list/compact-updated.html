<article>
    <a href="{{ .RelPermalink }}">
        <div class="article-details">
            <h2 class="article-title">
                {{- .Title -}}
            </h2>
            <footer class="article-time">
                <time class="dynamic-update-time" datetime='{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}' title='更新于 {{ .Lastmod.Format "2006-01-02 15:04" }}'>
                    {{ .Lastmod.Format "2006-01-02" }} 更新
                </time>
            </footer>
        </div>

        {{- $image := partial "helper/image" (dict "Image" .Params.image "Resources" .Resources) -}}
        {{ if $image }}
        <div class="article-image">
            <img src="{{ $image.Permalink }}" width="{{ $image.Width }}" height="{{ $image.Height }}" alt="{{ .Title }}"
                loading="lazy">
        </div>
        {{ end }}
    </a>
</article>
